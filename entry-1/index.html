<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather UI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="weather-box">
    <div id="icon-el" class="icon sun"></div>
    <p id="weather-label">Sunny</p>
    <p id="stat-temp">74°F</p>

    <button onclick="setWeather('rain')">Rain</button>
    <button onclick="setWeather('sun')">Sun</button>
    <button onclick="setWeather('cloud')">Cloud</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
